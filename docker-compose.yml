services:
  mongo:
    image: mongo:7
    container_name: scale-mongo
    restart: unless-stopped
    volumes:
      - /DATA/AppData/scale/mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: scale-backend
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: scale
      JWT_SECRET: REPLACE_WITH_A_LONG_RANDOM_SECRET
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: REPLACE_WITH_A_STRONG_ADMIN_PASSWORD
      CORS_ORIGINS: http://192.168.1.50:8080
      PUBLIC_APP_URL: http://192.168.1.50:8080
      ADMIN_EMAIL: you@example.com
      BREVO_API_KEY: REPLACE_WITH_BREVO_API_KEY
      SENDER_EMAIL: you@example.com
      REPLY_TO_EMAIL: you@example.com
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    container_name: scale-frontend
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
